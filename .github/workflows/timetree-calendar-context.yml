name: TimeTree Calendar Context

on:
  workflow_dispatch:
  schedule:
    # GitHub cron uses UTC. This lands before a 07:00 Europe/London planner run
    # throughout the year, though it is earlier during GMT.
    - cron: "00 4 * * *"
      timezone: "Europe/London"

jobs:
  export-calendar-context:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install TimeTree exporter
        run: python -m pip install --upgrade timetree-exporter recurring-ical-events

      - name: Export TimeTree ICS
        env:
          TIMETREE_EMAIL: ${{ secrets.TIMETREE_EMAIL }}
          TIMETREE_PASSWORD: ${{ secrets.TIMETREE_PASSWORD }}
          TIMETREE_CALENDAR_CODE: ${{ secrets.TIMETREE_CALENDAR_CODE }}
        run: timetree-exporter --calendar_code "$TIMETREE_CALENDAR_CODE" -o timetree.ics

      - name: Build planner calendar context
        run: python scripts/timetree_calendar_context.py --ics timetree.ics --timezone Europe/London --output calendar-context.json

      - name: Post context to n8n
        env:
          N8N_TIMETREE_CONTEXT_WEBHOOK_URL: ${{ secrets.N8N_TIMETREE_CONTEXT_WEBHOOK_URL }}
          N8N_TIMETREE_CONTEXT_API_KEY: ${{ secrets.N8N_TIMETREE_CONTEXT_API_KEY }}
        run: |
          curl -fsS \
            -X POST "$N8N_TIMETREE_CONTEXT_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -H "X-API-Key: $N8N_TIMETREE_CONTEXT_API_KEY" \
            --data-binary @calendar-context.json
